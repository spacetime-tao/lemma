name: Docker

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lean sandbox
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/lean.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lemma-lean-sandbox:${{ github.ref_name }}
      - name: Runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lemma-runtime:${{ github.ref_name }}
