name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check lemma tests
      - name: Pytest
        run: uv run pytest tests/ -q

  docker-lean-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      # Lean+mathlib image is huge; free several GB before build. (Do not wipe
      # $AGENT_TOOLSDIRECTORY before setup-uv — need tool cache for uv.)
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY/CodeQL" || true
          sudo docker system prune -af || true
          df -h /
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync (pytest)
        run: uv sync --extra dev
      # Classic `docker build` loads into the local daemon directly. Buildx+`load`
      # exports a tarball then imports it (~2× peak disk); that hit "no space left"
      # on ubuntu-latest while importing mathlib layers.
      - name: Build Lean sandbox image
        run: docker build -f compose/lean.Dockerfile -t lemma-lean-sandbox:ci .
      - name: Docker golden Lean verify
        run: LEAN_SANDBOX_IMAGE=lemma-lean-sandbox:ci RUN_DOCKER_LEAN=1 uv run pytest tests/test_docker_golden.py -v --tb=short
      - name: Generated templates lake build (mainnet gate)
        run: LEAN_SANDBOX_IMAGE=lemma-lean-sandbox:ci RUN_DOCKER_LEAN_TEMPLATES=1 uv run python scripts/ci_verify_generated_templates.py
