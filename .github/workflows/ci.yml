name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check lemma tests
      - name: Pytest
        run: uv run pytest tests/ -q

  docker-lean-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync (pytest)
        run: uv sync --extra dev
      # Buildx does not load into the local daemon unless load=true; otherwise
      # pytest/docker-py tries to pull lemma-lean-sandbox:ci from a registry (404).
      - name: Build Lean sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/lean.Dockerfile
          push: false
          load: true
          # Single platform so `load` works; matches ubuntu-latest (amd64). Provenance
          # off avoids occasional BuildKit+daemon issues when loading into the local store.
          platforms: linux/amd64
          provenance: false
          tags: lemma-lean-sandbox:ci
      - name: Docker golden Lean verify
        run: LEAN_SANDBOX_IMAGE=lemma-lean-sandbox:ci RUN_DOCKER_LEAN=1 uv run pytest tests/test_docker_golden.py -v --tb=short
      - name: Generated templates lake build (mainnet gate)
        run: LEAN_SANDBOX_IMAGE=lemma-lean-sandbox:ci RUN_DOCKER_LEAN_TEMPLATES=1 uv run python scripts/ci_verify_generated_templates.py
